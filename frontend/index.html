<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>社区助手</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef4ff;
      --bg-accent: #dfeafe;
      --surface: rgba(255, 255, 255, 0.84);
      --surface-strong: #ffffff;
      --surface-muted: #f4f8ff;
      --border: rgba(37, 99, 235, 0.12);
      --text: #10203f;
      --text-soft: #6b7a96;
      --user: #2563eb;
      --user-hover: #1d4ed8;
      --assistant-accent: #dbeafe;
      --shadow: 0 24px 80px rgba(37, 99, 235, 0.12);
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --composer-h: 132px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(96, 165, 250, 0.18), transparent 32%),
        linear-gradient(180deg, var(--bg-accent), var(--bg));
    }

    button,
    textarea {
      font: inherit;
    }

    .app {
      position: relative;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    .app::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 255, 255, 0.72), transparent 28%),
        radial-gradient(circle at 80% 0%, rgba(147, 197, 253, 0.28), transparent 26%);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(18px);
      background: rgba(238, 244, 255, 0.74);
      border-bottom: 1px solid rgba(37, 99, 235, 0.08);
    }

    .topbar-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 18px 20px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      position: relative;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2563eb, #ffffff);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.45),
        0 10px 22px rgba(37, 99, 235, 0.18);
      flex: none;
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      position: absolute;
      inset: 7px;
      border-radius: 50%;
    }

    .brand-mark::before {
      background: rgba(255, 255, 255, 0.92);
    }

    .brand-mark::after {
      inset: 12px;
      border: 2px solid #2563eb;
      background: transparent;
    }

    .brand-text h1 {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .brand-text p {
      margin: 2px 0 0;
      font-size: 12px;
      color: var(--text-soft);
    }

    .main {
      flex: 1;
      width: 100%;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    .main::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 65% 8%, rgba(255, 255, 255, 0.58), transparent 28%),
        radial-gradient(circle at 50% 100%, rgba(147, 197, 253, 0.22), transparent 34%);
    }

    .scroll-region {
      position: relative;
      z-index: 1;
      height: 100%;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-behavior: smooth;
      scrollbar-gutter: stable both-edges;
    }

    .chat-shell {
      max-width: 960px;
      margin: 0 auto;
      min-height: 100%;
      padding: 18px 20px calc(var(--composer-h) + var(--safe-bottom) + 32px);
      position: relative;
    }

    .chat-shell.is-empty {
      /* 首屏欢迎态保持单屏展示，不让引导页本身产生滚动。 */
      min-height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding-top: 168px;
      padding-bottom: calc(var(--composer-h) + var(--safe-bottom) + 18px);
      overflow: hidden;
    }

    .chat {
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-height: 100%;
    }

    .empty-state {
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      min-height: 0;
      animation: fade-up 220ms ease-out;
    }

    .empty-state.hidden {
      display: none;
    }

    .empty-card {
      width: min(100%, 640px);
      padding: 0;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .empty-card::before {
      content: "";
      position: absolute;
      inset: -44px -72px;
      border-radius: 40px;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.72), transparent 44%),
        radial-gradient(circle at 50% 100%, rgba(191, 219, 254, 0.38), transparent 58%);
      filter: blur(18px);
      z-index: -1;
    }

    .empty-emoji {
      font-size: 40px;
      line-height: 1;
      margin-bottom: 18px;
    }

    .empty-card h2 {
      margin: 0 0 14px;
      font-size: clamp(28px, 4vw, 38px);
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    .empty-card p {
      margin: 0 auto;
      max-width: 560px;
      color: var(--text-soft);
      font-size: 15px;
      line-height: 1.8;
    }

    .starter-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 28px;
    }

    .starter-chip {
      border: 1px solid rgba(37, 99, 235, 0.12);
      background: rgba(255, 255, 255, 0.78);
      color: #1e3a8a;
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 160ms ease, transform 160ms ease, border-color 160ms ease;
    }

    .starter-chip:hover {
      background: rgba(219, 234, 254, 0.9);
      border-color: rgba(37, 99, 235, 0.2);
      transform: translateY(-1px);
    }

    .message {
      display: flex;
      align-items: flex-start;
      animation: fade-up 180ms ease-out;
    }

    .message.user {
      justify-content: flex-end;
    }

    .message-body {
      max-width: min(84%, 760px);
      min-width: 0;
    }

    .message-meta {
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--text-soft);
    }

    .message.user .message-meta {
      text-align: right;
    }

    .bubble {
      padding: 14px 16px;
      border-radius: var(--radius-md);
      line-height: 1.7;
      word-break: break-word;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.04);
    }

    .message.assistant .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      border-top-left-radius: 10px;
    }

    .message.user .bubble {
      color: #ffffff;
      background: linear-gradient(135deg, var(--user), #60a5fa);
      border-top-right-radius: 10px;
    }

    .bubble.loading {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #38527f;
    }

    .bubble-content > :first-child {
      margin-top: 0;
    }

    .bubble-content > :last-child {
      margin-bottom: 0;
    }

    .bubble-content p {
      margin: 0 0 12px;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .bubble-content h1,
    .bubble-content h2,
    .bubble-content h3,
    .bubble-content h4 {
      margin: 0 0 12px;
      line-height: 1.35;
      letter-spacing: -0.02em;
    }

    .bubble-content h1 {
      font-size: 1.3em;
    }

    .bubble-content h2 {
      font-size: 1.18em;
    }

    .bubble-content h3,
    .bubble-content h4 {
      font-size: 1.05em;
    }

    .bubble-content ul,
    .bubble-content ol {
      margin: 0 0 12px;
      padding-left: 1.4em;
    }

    .bubble-content li + li {
      margin-top: 6px;
    }

    .bubble-content blockquote {
      margin: 0 0 12px;
      padding: 10px 14px;
      border-left: 3px solid rgba(37, 99, 235, 0.24);
      background: rgba(255, 255, 255, 0.54);
      border-radius: 0 12px 12px 0;
      color: #324766;
    }

    .bubble-content pre {
      margin: 0 0 12px;
      padding: 14px;
      overflow-x: auto;
      border-radius: 14px;
      background: #edf4ff;
      border: 1px solid rgba(37, 99, 235, 0.1);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.92em;
      line-height: 1.6;
    }

    .bubble-content pre code {
      padding: 0;
      background: transparent;
      border-radius: 0;
      font-size: inherit;
    }

    .bubble-content strong {
      font-weight: 700;
    }

    .bubble-content em {
      font-style: italic;
    }

    .bubble-content code {
      padding: 1px 6px;
      border-radius: 6px;
      background: rgba(37, 99, 235, 0.08);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.92em;
    }

    .bubble-content a {
      color: #1d4ed8;
      text-decoration: underline;
      text-underline-offset: 2px;
      word-break: break-all;
    }

    .bubble-content .table-wrap {
      margin: 0 0 12px;
      overflow-x: auto;
      border-radius: 12px;
    }

    .bubble-content hr {
      margin: 0 0 12px;
      border: 0;
      border-top: 1px solid rgba(37, 99, 235, 0.14);
    }

    .bubble-content table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid rgba(37, 99, 235, 0.12);
      font-size: 0.96em;
      background: rgba(255, 255, 255, 0.7);
    }

    .bubble-content th,
    .bubble-content td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(37, 99, 235, 0.08);
      text-align: left;
      vertical-align: top;
    }

    .bubble-content th {
      background: rgba(37, 99, 235, 0.06);
      font-weight: 600;
    }

    .bubble-content tr:last-child td {
      border-bottom: 0;
    }

    .bubble-content img {
      display: block;
      max-width: 100%;
      margin: 0 0 12px;
      border-radius: 14px;
      border: 1px solid rgba(37, 99, 235, 0.1);
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
    }

    .loading-dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }

    .loading-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(59, 130, 246, 0.72);
      animation: blink 1s infinite ease-in-out;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .loading-dots span:nth-child(3) {
      animation-delay: 0.3s;
    }

    .composer-wrap {
      /* 输入区固定在底部，聊天内容通过底部 padding 预留空间。 */
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 20;
      padding: 12px 16px calc(16px + var(--safe-bottom));
      background:
        linear-gradient(180deg, rgba(238, 244, 255, 0), rgba(238, 244, 255, 0.12) 36%, rgba(238, 244, 255, 0.3) 100%);
    }

    .composer {
      max-width: 960px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(37, 99, 235, 0.14);
      border-radius: 28px;
      box-shadow:
        0 20px 60px rgba(37, 99, 235, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.72);
      overflow: hidden;
      transition: box-shadow 160ms ease, border-color 160ms ease, transform 160ms ease;
    }

    .composer:focus-within {
      border-color: rgba(37, 99, 235, 0.28);
      box-shadow:
        0 24px 72px rgba(37, 99, 235, 0.16),
        0 0 0 4px rgba(191, 219, 254, 0.7);
    }

    .composer-inner {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 18px 10px;
    }

    .input-wrap {
      flex: 1;
      min-width: 0;
    }

    textarea {
      display: block;
      width: 100%;
      min-height: 34px;
      max-height: 180px;
      padding: 8px 4px 8px 6px;
      border: 0;
      resize: none;
      background: transparent;
      color: var(--text);
      outline: none;
      font-size: 16px;
      line-height: 1.55;
    }

    textarea::placeholder {
      color: #8ea2c9;
    }

    .composer-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 18px 18px;
    }

    .status {
      min-height: 20px;
      font-size: 13px;
      color: var(--text-soft);
      transition: color 160ms ease;
    }

    .status.error {
      color: #c2410c;
    }

    .send-btn {
      border: 0;
      min-width: 60px;
      width: 60px;
      height: 60px;
      padding: 0;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--user), #60a5fa);
      color: #ffffff;
      cursor: pointer;
      font-size: 0;
      font-weight: 600;
      position: relative;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.24);
      transition: transform 160ms ease, background 160ms ease, opacity 160ms ease, box-shadow 160ms ease;
    }

    .send-btn::before {
      content: "";
      width: 16px;
      height: 16px;
      border-top: 2px solid #ffffff;
      border-right: 2px solid #ffffff;
      transform: translate(-3px, 1px) rotate(45deg);
      position: absolute;
      inset: 0;
      margin: auto;
    }

    .send-btn:hover:not(:disabled) {
      background: linear-gradient(135deg, var(--user-hover), #3b82f6);
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(37, 99, 235, 0.28);
    }

    .send-btn:disabled {
      opacity: 0.58;
      cursor: not-allowed;
      transform: none;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes blink {
      0%, 80%, 100% {
        transform: scale(0.8);
        opacity: 0.4;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 720px) {
      :root {
        --composer-h: 148px;
      }

      .topbar-inner {
        padding: 14px 16px;
      }

      .brand-text p {
        display: none;
      }

      .chat-shell {
        padding: 14px 14px calc(var(--composer-h) + var(--safe-bottom) + 22px);
      }

      .chat-shell.is-empty {
        padding-top: 128px;
        padding-bottom: calc(var(--composer-h) + var(--safe-bottom) + 12px);
      }

      .chat {
        gap: 16px;
      }

      .message-body {
        max-width: 88%;
      }

      .bubble {
        padding: 13px 14px;
      }

      .empty-card {
        width: min(100%, 560px);
      }

      .empty-card::before {
        inset: -28px -22px;
        border-radius: 28px;
      }

      .empty-emoji {
        font-size: 34px;
      }

      .composer-wrap {
        padding: 10px 12px calc(12px + var(--safe-bottom));
      }

      .composer-inner {
        gap: 10px;
        padding: 16px 16px 10px;
      }

      .composer-footer {
        align-items: flex-end;
        padding: 0 16px 16px;
      }

      .status {
        font-size: 12px;
      }

      .send-btn {
        min-width: 56px;
        width: 56px;
        height: 56px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true"></div>
          <div class="brand-text">
            <h1>社区助手</h1>
            <p>在线</p>
          </div>
        </div>
      </div>
    </header>

    <main class="main">
      <div id="scrollRegion" class="scroll-region">
        <div id="chatShell" class="chat-shell">
          <section id="emptyState" class="empty-state" aria-label="欢迎页">
            <div class="empty-card">
              <div class="empty-emoji" aria-hidden="true">👋</div>
              <h2>你好，我是社区助手</h2>
              <p>我可以帮你查询物业服务、社区配套和常见办事问题。直接输入你的问题，或者从下面挑一个开始。</p>
              <div class="starter-list">
                <button class="starter-chip" type="button" data-question="门禁怎么录入人脸？">门禁怎么录入人脸？</button>
                <button class="starter-chip" type="button" data-question="物业费怎么缴纳？">物业费怎么缴纳？</button>
                <button class="starter-chip" type="button" data-question="附近有洗衣服务吗？">附近有洗衣服务吗？</button>
              </div>
            </div>
          </section>
          <section id="chat" class="chat" aria-live="polite" aria-label="聊天记录"></section>
        </div>
      </div>
    </main>

    <div class="composer-wrap">
      <div class="composer">
        <div class="composer-inner">
          <div class="input-wrap">
            <label class="sr-only" for="questionInput">输入问题</label>
            <textarea id="questionInput" rows="1" placeholder="发消息给社区助手" enterkeyhint="send"></textarea>
          </div>
          <button id="sendBtn" class="send-btn" type="button">发送</button>
        </div>
        <div class="composer-footer">
          <div id="statusText" class="status" aria-live="polite"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '/ask';

    const chat = document.getElementById('chat');
    const scrollRegion = document.getElementById('scrollRegion');
    const chatShell = document.getElementById('chatShell');
    const emptyState = document.getElementById('emptyState');
    const questionInput = document.getElementById('questionInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusText = document.getElementById('statusText');

    let isSending = false;
    const conversationContext = [];
    const CONTEXT_WINDOW_SIZE = 6;

    function formatTime(date = new Date()) {
      return new Intl.DateTimeFormat('zh-CN', {
        hour: '2-digit',
        minute: '2-digit'
      }).format(date);
    }

    function setStatus(message = '', isError = false) {
      statusText.textContent = message;
      statusText.classList.toggle('error', Boolean(isError && message));
    }

    function syncEmptyState() {
      // 首次进入页面时显示欢迎态；一旦有消息，切换到正常聊天布局。
      const hasMessages = chat.children.length > 0;
      emptyState.classList.toggle('hidden', hasMessages);
      chatShell.classList.toggle('is-empty', !hasMessages);
    }

    function resizeTextarea() {
      questionInput.style.height = 'auto';
      const nextHeight = Math.min(questionInput.scrollHeight, 180);
      questionInput.style.height = nextHeight + 'px';
    }

    function pushContextItem(role, content, source = 'chat', kind = 'message', metadata = {}) {
      conversationContext.push({ role, content, source, kind, metadata });
      if (conversationContext.length > 20) {
        conversationContext.splice(0, conversationContext.length - 20);
      }
    }

    function getContextWindow() {
      return conversationContext.slice(-CONTEXT_WINDOW_SIZE);
    }

    function scrollToBottom(behavior = 'smooth') {
      requestAnimationFrame(() => {
        scrollRegion.scrollTo({
          top: scrollRegion.scrollHeight,
          behavior
        });
      });
    }

    function escapeHtml(text) {
      return text
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderInlineMarkdown(text) {
      let html = escapeHtml(text);
      html = html.replace(/!\[([^\]]*)\]\((https?:\/\/[^\s)]+)\)/g, '<img src="$2" alt="$1" loading="lazy">');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
      html = html.replace(/(^|[\s(])(https?:\/\/[^\s<]+)/g, '$1<a href="$2" target="_blank" rel="noopener noreferrer">$2</a>');
      return html;
    }

    function renderTable(block) {
      const lines = block.split('\n').map((line) => line.trim()).filter(Boolean);
      if (lines.length < 2) {
        return '';
      }

      const separatorPattern = /^\|?[\s:-]+(\|[\s:-]+)+\|?$/;
      if (!separatorPattern.test(lines[1])) {
        return '';
      }

      const parseRow = (line) => line
        .replace(/^\|/, '')
        .replace(/\|$/, '')
        .split('|')
        .map((cell) => cell.trim());

      const headers = parseRow(lines[0]);
      const rows = lines.slice(2).map(parseRow);

      const headHtml = `<tr>${headers.map((cell) => `<th>${renderInlineMarkdown(cell)}</th>`).join('')}</tr>`;
      const bodyHtml = rows.map((cells) => `<tr>${cells.map((cell) => `<td>${renderInlineMarkdown(cell)}</td>`).join('')}</tr>`).join('');
      return `<div class="table-wrap"><table><thead>${headHtml}</thead><tbody>${bodyHtml}</tbody></table></div>`;
    }

    function renderAssistantMarkdown(text) {
      const normalized = text.replace(/\r\n/g, '\n').trim();
      if (!normalized) {
        return '';
      }

      const codeBlocks = [];
      const withPlaceholders = normalized.replace(/```([\w-]*)\n?([\s\S]*?)```/g, (_, lang, code) => {
        const placeholder = `__CODE_BLOCK_${codeBlocks.length}__`;
        const languageClass = lang ? ` class="language-${escapeHtml(lang)}"` : '';
        codeBlocks.push(`<pre><code${languageClass}>${escapeHtml(code.trim())}</code></pre>`);
        return placeholder;
      });

      const blocks = withPlaceholders.split(/\n\s*\n/);
      const htmlBlocks = blocks.map((block) => {
        const trimmedBlock = block.trim();
        if (!trimmedBlock) {
          return '';
        }

        const codeMatch = trimmedBlock.match(/^__CODE_BLOCK_(\d+)__$/);
        if (codeMatch) {
          return codeBlocks[Number(codeMatch[1])] || '';
        }

        if (/^---+$/.test(trimmedBlock) || /^\*\*\*+$/.test(trimmedBlock)) {
          return '<hr>';
        }

        const tableHtml = renderTable(trimmedBlock);
        if (tableHtml) {
          return tableHtml;
        }

        const lines = trimmedBlock.split('\n').map((line) => line.trim()).filter(Boolean);
        if (!lines.length) {
          return '';
        }

        if (lines.every((line) => /^>\s?/.test(line))) {
          const content = lines.map((line) => line.replace(/^>\s?/, '')).map(renderInlineMarkdown).join('<br>');
          return `<blockquote>${content}</blockquote>`;
        }

        const headingMatch = lines.length === 1 ? lines[0].match(/^(#{1,4})\s+(.+)$/) : null;
        if (headingMatch) {
          const level = Math.min(headingMatch[1].length, 4);
          return `<h${level}>${renderInlineMarkdown(headingMatch[2])}</h${level}>`;
        }

        const unordered = lines.every((line) => /^[-*•]\s+/.test(line));
        const ordered = lines.every((line) => /^\d+\.\s+/.test(line));

        if (unordered) {
          const items = lines
            .map((line) => line.replace(/^[-*•]\s+/, ''))
            .map((line) => `<li>${renderInlineMarkdown(line)}</li>`)
            .join('');
          return `<ul>${items}</ul>`;
        }

        if (ordered) {
          const items = lines
            .map((line) => line.replace(/^\d+\.\s+/, ''))
            .map((line) => `<li>${renderInlineMarkdown(line)}</li>`)
            .join('');
          return `<ol>${items}</ol>`;
        }

        return `<p>${lines.map(renderInlineMarkdown).join('<br>')}</p>`;
      });

      return htmlBlocks.join('');
    }

    function createMessage(role, text, options = {}) {
      const message = document.createElement('article');
      message.className = `message ${role}`;

      const body = document.createElement('div');
      body.className = 'message-body';

      const meta = document.createElement('div');
      meta.className = 'message-meta';
      meta.textContent = role === 'user' ? `你 · ${formatTime()}` : `社区助手 · ${formatTime()}`;

      const bubble = document.createElement('div');
      bubble.className = options.loading ? 'bubble loading' : 'bubble';

      if (options.loading) {
        const textNode = document.createElement('span');
        textNode.textContent = text;

        const dots = document.createElement('span');
        dots.className = 'loading-dots';
        dots.innerHTML = '<span></span><span></span><span></span>';

        bubble.appendChild(textNode);
        bubble.appendChild(dots);
      } else {
        if (role === 'assistant') {
          const content = document.createElement('div');
          content.className = 'bubble-content';
          content.innerHTML = renderAssistantMarkdown(text);
          bubble.appendChild(content);
        } else {
          bubble.textContent = text;
        }
      }

      body.appendChild(meta);
      body.appendChild(bubble);
      message.appendChild(body);
      chat.appendChild(message);
      syncEmptyState();
      scrollToBottom(chat.children.length > 2 ? 'smooth' : 'auto');

      return {
        message,
        bubble,
        meta
      };
    }

    function setSendingState(sending) {
      isSending = sending;
      sendBtn.disabled = sending;
      questionInput.disabled = sending;
      sendBtn.setAttribute('aria-label', sending ? '发送中' : '发送');
    }

    async function sendQuestion() {
      const question = questionInput.value.trim();
      if (!question || isSending) {
        return;
      }

      setStatus('');
      // 用户消息先上屏，再发请求，避免交互显得“卡一下才有反应”。
      createMessage('user', question);
      const requestContext = getContextWindow();
      pushContextItem('user', question);
      questionInput.value = '';
      resizeTextarea();
      setSendingState(true);

      const loading = createMessage('assistant', '正在思考', { loading: true });

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            question,
            context: requestContext
          })
        });

        if (!response.ok) {
          throw new Error(`请求失败，状态码 ${response.status}`);
        }

        const data = await response.json();
        loading.message.remove();

        // 前端只展示 answer；即使后端返回 hits/citations，也不在当前 UI 渲染。
        createMessage('assistant', data.answer || '已收到消息，但暂时没有可显示的回复。');
        pushContextItem('assistant', data.answer || '已收到消息，但暂时没有可显示的回复。');
        setStatus('');
      } catch (error) {
        loading.message.remove();
        createMessage('assistant', '这次回复出了点问题，请稍后再试。');
        pushContextItem('assistant', '这次回复出了点问题，请稍后再试。', 'chat', 'error');
        setStatus(error.message || '请求失败，请稍后重试。', true);
      } finally {
        setSendingState(false);
      }
    }

    sendBtn.addEventListener('click', sendQuestion);

    document.querySelectorAll('.starter-chip').forEach((chip) => {
      chip.addEventListener('click', () => {
        questionInput.value = chip.dataset.question || '';
        resizeTextarea();
        sendQuestion();
      });
    });

    questionInput.addEventListener('input', resizeTextarea);

    questionInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendQuestion();
      }
    });

    resizeTextarea();
    syncEmptyState();
  </script>
</body>
</html>
